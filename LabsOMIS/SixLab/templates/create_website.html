{% extends "base.html" %}

{% block title %}Создать веб-сайт{% endblock %}

{% block content %}
<div class="create-website-page">
    <h1>Создать новый веб-сайт</h1>

    <form id="createWebsiteForm" class="create-form">
        <div class="form-group">
            <label for="name">Название сайта *</label>
            <input type="text" id="name" name="name" required placeholder="Введите название сайта">
        </div>

        <div class="form-group">
            <label for="type">Тип сайта *</label>
            <select id="type" name="type" required>
                <option value="corporate">Корпоративный сайт</option>
                <option value="ecommerce">Интернет-магазин</option>
                <option value="blog">Блог</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">Описание сайта</label>
            <textarea id="description" name="description" rows="4" 
                      placeholder="Опишите назначение и особенности вашего сайта"></textarea>
        </div>

        <div class="form-group">
            <label for="target_audience">Целевая аудитория</label>
            <input type="text" id="target_audience" name="target_audience" 
                   placeholder="Опишите целевую аудиторию">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Создать сайт</button>
            <a href="{{ url_for('websites_list') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('createWebsiteForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const nameInput = document.getElementById('name');
    const name = nameInput.value.trim();
    
    if (!name) {
        alert('Пожалуйста, введите название сайта');
        nameInput.focus();
        return;
    }
    
    const formData = new FormData(this);
    const data = Object.fromEntries(formData);
    
    if (data.name) data.name = data.name.trim();
    if (data.description) data.description = data.description.trim();
    if (data.target_audience) data.target_audience = data.target_audience.trim();
    
    const submitBtn = this.querySelector('button[type="submit"]');
    const originalText = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Создание...';
    
    fetch('{{ url_for("create_website") }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(response => {
        if (!response.ok) {
            return response.json().then(err => Promise.reject(err));
        }
        return response.json();
    })
    .then(data => {
        if (data.success) {
            alert('Веб-сайт успешно создан!');
            window.location.href = `/websites/${data.website_id}`;
        } else {
            alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
        }
    })
    .catch(error => {
        console.error('Ошибка:', error);
        alert('Ошибка при создании сайта: ' + (error.error || error.message || 'Неизвестная ошибка'));
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
    });
});
</script>
{% endblock %}
